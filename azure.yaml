# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: ai-foundry-starter-basic
services:
    hosted-langgraph-agent:
        project: ./agents
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "1"
                    memory: 2Gi
            startupCommand: python stage4_foundry_hosted.py
    hosted-langgraph-workflow:
        project: ./workflows
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "1"
                    memory: 2Gi
            startupCommand: python stage3_foundry_hosted_as_agent.py
infra:
    provider: bicep
    path: ./infra
hooks:
    postdeploy:
        windows:
            shell: pwsh
            run: infra/hooks/postdeploy.ps1
            interactive: true
        posix:
            name: postdeploy
            kind: sh
            shell: sh
            run: infra/hooks/postdeploy.sh
            interactive: true
    postprovision:
        windows:
            shell: pwsh
            run: infra/hooks/postprovision.ps1
            interactive: true
        posix:
            name: postprovision
            kind: sh
            shell: sh
            run: infra/hooks/postprovision.sh
            interactive: true
    prepackage:
        windows:
            shell: pwsh
            run: |
                Write-Host "Copying shared vendor/ into service directories..."
                Copy-Item -Recurse -Force vendor agents\vendor
                Copy-Item -Recurse -Force vendor workflows\vendor
        posix:
            name: prepackage
            kind: sh
            shell: sh
            run: |
                echo "Copying shared vendor/ into service directories..."
                cp -r vendor/ agents/vendor/
                cp -r vendor/ workflows/vendor/
